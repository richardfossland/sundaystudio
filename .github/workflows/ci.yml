name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri needs the system webview + GTK libs to compile on Linux, and
      # cpal needs ALSA dev headers (libasound2-dev) to build the audio core.
      # (ffmpeg sidecar / ONNX system deps get added here in their phases.)
      - name: Install Tauri + audio system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libasound2-dev

      - run: npm ci

      - name: Frontend lint / format / types
        run: |
          npm run lint
          npm run format:check
          npm run typecheck

      - name: Frontend unit tests
        run: npm run test

      # The Rust suite includes the audio engine tests. These are deliberately
      # device-INDEPENDENT (device enumeration tolerates zero devices; the tone
      # writer goes straight to disk) so they pass on a headless runner with no
      # sound card. Device-DEPENDENT capture/playback tests arrive in Phase 1
      # behind a virtual-device matrix (BlackHole on macOS, VB-CABLE on Windows);
      # see docs/ARCHITECTURE.md and the note in tests/audio_golden.rs.
      - name: Rust fmt / clippy / tests
        working-directory: src-tauri
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test

      - name: End-to-end (Playwright)
        run: |
          npm run build
          npx playwright install --with-deps chromium
          npm run test:e2e

  build:
    name: Build (${{ matrix.platform }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # Compiles the frontend + the Rust audio app on both first-class
      # platforms (CoreAudio on macOS, WASAPI on Windows). Bundling / signing /
      # notarization is wired up in Phase 9 (distribution).
      - name: Build Tauri app
        run: npm run tauri build -- --no-bundle
